name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Validate tag and set env
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$ ]]; then
            echo "Invalid tag format: $GITHUB_REF_NAME"
            exit 1
          fi
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "NPM_TAG=next" >> $GITHUB_ENV
          else
            echo "NPM_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Sync versions (before UI build)
        run: |
          for pkg in core server metro-plugin mcp ui; do
            (cd packages/$pkg && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          done

      - name: Install UI dependencies
        run: cd packages/ui && npm install

      - name: Build UI
        run: cd packages/ui && npm run build

      - name: Verify UI build output
        run: |
          test -f packages/server/public/index.html || (echo "UI build missing index.html" && exit 1)

      - name: Install publishable packages
        run: |
          for pkg in core server metro-plugin mcp; do
            (cd packages/$pkg && npm install)
          done

      - name: Smoke test
        run: |
          node -e "require('./packages/core/src/index.js')"
          node packages/server/src/index.js &
          SERVER_PID=$!
          sleep 3
          kill $SERVER_PID || true

      - name: Dry-run all packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in core server metro-plugin mcp; do
            echo "--- Dry-run: $pkg ---"
            (cd packages/$pkg && npm publish --dry-run --access public --ignore-scripts)
          done

      - name: Publish core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/core && npm publish --access public --provenance --tag $NPM_TAG

      - name: Publish server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/server && npm publish --access public --provenance --tag $NPM_TAG --ignore-scripts

      - name: Publish metro-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/metro-plugin && npm publish --access public --provenance --tag $NPM_TAG

      - name: Publish mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd packages/mcp && npm publish --access public --provenance --tag $NPM_TAG

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
